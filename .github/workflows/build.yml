name: Build macOS and Windows Apps

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build macOS app
        run: |
          python -m PyInstaller \
            --name "OG Xbox Cover Downloader" \
            --onedir \
            --windowed \
            xbox_cover_desktop.py
      
      - name: Code sign macOS app
        run: |
          codesign -s - --deep --force "dist/OG Xbox Cover Downloader.app" || true
          xattr -d com.apple.quarantine "dist/OG Xbox Cover Downloader.app" || true
      
      - name: Create macOS release zip
        run: |
          cd dist
          zip -r "OG-Xbox-Cover-Downloader-macOS.zip" "OG Xbox Cover Downloader.app"
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: dist/OG-Xbox-Cover-Downloader-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows exe
        run: python -m PyInstaller --name "OG-Xbox-Cover-Downloader" --onedir --windowed xbox_cover_desktop.py
      
      - name: Create Windows release zip
        run: |
          cd dist
          powershell Compress-Archive -Path "OG-Xbox-Cover-Downloader" -DestinationPath "OG-Xbox-Cover-Downloader-Windows.zip"
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: dist/OG-Xbox-Cover-Downloader-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-app
          path: ./release-files
      
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-app
          path: ./release-files
      
      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd release-files
          gh release create ${{ github.ref_name }} *.zip --title "${{ github.ref_name }}: OG Xbox Cover Downloader" --notes "Pre-built executables for macOS and Windows."
            
            ## Windows
            - Download `OG-Xbox-Cover-Downloader-Windows.zip`
            - Unzip the folder
            - Run `OG-Xbox-Cover-Downloader.exe` inside
            
            No Python installation needed!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
